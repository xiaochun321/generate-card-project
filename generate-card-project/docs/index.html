<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>成语卡片生成器</title>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  background: linear-gradient(135deg, #fdf7eb, #f7efe3);
  color: #4a3423;
  min-height: 100vh;
}
.page {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 24px;
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}
.panel {
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
}
.panel h1 { font-size: 1.6em; margin-bottom: 6px; }
.panel > p { color: #8a6d4b; margin-bottom: 16px; }
.form-grid { display: grid; gap: 14px; }
.form-grid label { display: grid; gap: 4px; font-weight: 500; }
input, textarea, button, select {
  padding: 10px 12px;
  border: 1px solid #d8c0a3;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
}
input:focus, textarea:focus { outline: 2px solid #b8966c; border-color: transparent; }
button {
  background: #7e4b25;
  color: #fff;
  cursor: pointer;
  border: none;
  font-weight: 600;
  padding: 12px;
  font-size: 16px;
  transition: background 0.2s;
}
button:hover { background: #633c1c; }
button:disabled { background: #b8a28a; cursor: not-allowed; }
fieldset {
  border: 1px solid #e7d8be;
  border-radius: 12px;
  padding: 14px;
}
fieldset legend {
  color: #7e4b25;
  font-weight: 600;
  padding: 0 6px;
}
.message {
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 12px;
  display: none;
}
.message.show { display: block; }
.message.error { background: #fff0ef; color: #a14333; }
.message.info { background: #eff8ff; color: #3366a1; }
.message.success { background: #f0fff0; color: #338833; }
.preview { display: flex; flex-direction: column; align-items: center; }
.preview h2 { margin-bottom: 10px; }
.preview canvas {
  width: 100%;
  border-radius: 16px;
  border: 1px solid #e7d8be;
  image-rendering: auto;
}
.card-meta { width: 100%; margin-top: 8px; }
.card-meta p { margin: 4px 0; line-height: 1.6; }
.download-btn {
  margin-top: 12px;
  background: #2d7d46;
}
.download-btn:hover { background: #236336; }
.placeholder {
  min-height: 240px;
  display: grid;
  place-items: center;
  color: #9a7e5d;
  border: 2px dashed #e6d4b5;
  border-radius: 16px;
  width: 100%;
}
.spinner {
  display: none;
  width: 30px; height: 30px;
  border: 3px solid #e7d8be;
  border-top-color: #7e4b25;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 16px auto;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 900px) {
  .page { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="page">
  <section class="panel">
    <h1>成语解读卡片生成器</h1>
    <p>填写成语和可选的模型配置后，即可生成一张可发布的成语卡片。</p>

    <div id="msgBox" class="message"></div>

    <form id="cardForm" class="form-grid">
      <label>
        成语名称
        <input name="idiom" id="idiom" placeholder="如：东窗事发" required>
      </label>
      <label>
        拼音（可选，留空自动生成）
        <input name="pinyin" id="pinyin" placeholder="如：dōng chuāng shì fā">
      </label>
      <label>
        简单解释（可选）
        <textarea name="explanation" id="explanation" rows="3"></textarea>
      </label>
      <label>
        故事讲述（可选）
        <textarea name="story" id="story" rows="3"></textarea>
      </label>
      <label>
        家长提示（可选）
        <textarea name="tip" id="tip" rows="3"></textarea>
      </label>

      <fieldset>
        <legend>正常模型（可选，兼容 OpenAI API）</legend>
        <label>接口地址<input name="normal_base" id="normal_base" placeholder="https://api.openai.com/v1"></label>
        <label>密钥<input name="normal_key" id="normal_key" type="password" placeholder="sk-..."></label>
        <label>模型名<input name="normal_model" id="normal_model" value="gpt-4o-mini"></label>
      </fieldset>

      <fieldset>
        <legend>生图模型（可选，兼容 OpenAI images API）</legend>
        <label>接口地址<input name="image_base" id="image_base" placeholder="https://api.openai.com/v1"></label>
        <label>密钥<input name="image_key" id="image_key" type="password" placeholder="sk-..."></label>
        <label>模型名<input name="image_model" id="image_model" value="gpt-image-1"></label>
      </fieldset>

      <button type="submit" id="submitBtn">生成卡片</button>
      <div class="spinner" id="spinner"></div>
    </form>
  </section>

  <section class="panel preview" id="previewPanel">
    <h2>生成结果</h2>
    <div id="previewArea" class="placeholder">在这里预览成语卡片。</div>
  </section>
</main>

<script>
(function() {

// ── Utility ─────────────────────────────────────────────────
function drawRoundedRect(ctx, x, y, w, h, r, fillColor, strokeColor, lineWidth) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = lineWidth || 1; ctx.stroke(); }
}

function wrapText(ctx, text, maxWidth) {
  var lines = [];
  var paragraphs = text.split('\n');
  for (var pi = 0; pi < paragraphs.length; pi++) {
    var current = '';
    for (var ci = 0; ci < paragraphs[pi].length; ci++) {
      var test = current + paragraphs[pi][ci];
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = paragraphs[pi][ci];
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    if (pi < paragraphs.length - 1) lines.push('');
  }
  return lines;
}

function getPinyin(text) {
  if (typeof pinyinPro !== 'undefined') {
    try {
      return pinyinPro.pinyin(text, { toneType: 'symbol', type: 'array' }).join(' ');
    } catch (e) {}
  }
  return '';
}

function showMsg(text, type) {
  var box = document.getElementById('msgBox');
  box.textContent = text;
  box.className = 'message ' + type + ' show';
}

function hideMsg() {
  document.getElementById('msgBox').className = 'message';
}

// ── Placeholder illustration ────────────────────────────────
function drawPlaceholderIllustration(ctx, x, y, w, h) {
  var r = Math.min(w, h) * 0.06;
  drawRoundedRect(ctx, x, y, w, h, r, '#f5ebd2', '#aa875f', 14);
  var innerX = x + w * 0.04;
  var innerY = y + h * 0.08;
  var innerW = w * 0.92;
  var innerH = h * 0.83;
  drawRoundedRect(ctx, innerX, innerY, innerW, innerH, r * 0.7, '#fff8e9', '#d2b478', 6);

  ctx.fillStyle = '#5f4123';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var titleSize = Math.round(Math.min(w, h) * 0.06);
  ctx.font = titleSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
  ctx.fillText('成语故事', x + w / 2, y + h * 0.42);

  var subSize = Math.round(titleSize * 0.55);
  ctx.font = subSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
  ctx.fillStyle = '#7d5f3c';
  ctx.fillText('AI 生图可替换插图', x + w / 2, y + h * 0.58);
}

// ── Card rendering ──────────────────────────────────────────
var CARD_W = 1530;
var CARD_H = 2741;
var loadedIllustration = null;

function renderCard(canvas, scale, data, illustration) {
  var W = CARD_W, H = CARD_H;
  canvas.width = Math.round(W * scale);
  canvas.height = Math.round(H * scale);
  var ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#f8ecd2';
  ctx.fillRect(0, 0, W, H);

  // Borders
  drawRoundedRect(ctx, 40, 40, W - 80, H - 80, 42, null, '#b29266', 7);
  drawRoundedRect(ctx, 60, 60, W - 120, H - 120, 38, null, '#d8bf96', 3);

  // Title (idiom)
  var titleFontSize = Math.round(W * 0.065);
  ctx.fillStyle = '#6c4a27';
  ctx.font = 'bold ' + titleFontSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(data.idiom, W / 2, Math.round(H * 0.06));

  // Pinyin
  var pinyin = data.pinyin || '';
  if (pinyin) {
    var parts = pinyin.split(' ');
    var charCount = Math.min(parts.length, 5);
    var cellWidth = Math.round(charCount <= 4 ? W * 0.16 : W * 0.13);
    var startX = Math.round(W * 0.23);
    var pinyinY = Math.round(H * 0.11);
    var pinyinFontSize = Math.round(W * 0.03);
    ctx.font = pinyinFontSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
    ctx.fillStyle = '#8c6e5a';
    ctx.textBaseline = 'top';
    for (var i = 0; i < charCount; i++) {
      var cellX = startX + i * cellWidth;
      var pw = ctx.measureText(parts[i]).width;
      ctx.textAlign = 'left';
      ctx.fillText(parts[i], cellX + (cellWidth - pw) / 2, pinyinY);
    }
  }

  // Illustration
  var illX = Math.round(W * 0.1);
  var illY = Math.round(H * 0.16);
  var illW = Math.round(W * 0.8);
  var illH = Math.round(H * 0.34);

  if (illustration && illustration.complete && illustration.naturalWidth > 0) {
    try {
      var sw = illustration.naturalWidth;
      var sh = illustration.naturalHeight;
      var ratio = Math.min(illW / sw, illH / sh);
      var dw = sw * ratio, dh = sh * ratio;
      var dx = illX + (illW - dw) / 2;
      var dy = illY + (illH - dh) / 2;

      // Soft mask via clipping + blur
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(illX, illY, illW, illH, 40);
      ctx.clip();
      ctx.drawImage(illustration, dx, dy, dw, dh);
      ctx.restore();

      // Subtle border on illustration
      drawRoundedRect(ctx, illX, illY, illW, illH, 40, null, '#d4c0a0', 4);
    } catch (e) {
      drawPlaceholderIllustration(ctx, illX, illY, illW, illH);
    }
  } else {
    drawPlaceholderIllustration(ctx, illX, illY, illW, illH);
  }

  // Content sections
  var sections = [
    { label: '简单解释', content: data.explanation || '' },
    { label: '故事讲述', content: data.story || '' },
    { label: '家长提示', content: data.tip || '' }
  ];

  var labelFontSize = Math.round(W * 0.038);
  var bodyFontSize = Math.round(W * 0.032);
  var y = Math.round(H * 0.58);

  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  for (var si = 0; si < sections.length; si++) {
    ctx.fillStyle = '#845c2c';
    ctx.font = 'bold ' + labelFontSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
    ctx.fillText(sections[si].label, Math.round(W * 0.10), y);
    y += Math.round(H * 0.04);

    ctx.fillStyle = '#503e2a';
    ctx.font = bodyFontSize + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
    var lines = wrapText(ctx, sections[si].content, Math.round(W * 0.8));
    for (var li = 0; li < lines.length; li++) {
      if (lines[li]) {
        ctx.fillText(lines[li], Math.round(W * 0.10), y);
        y += Math.round(H * 0.035);
      } else {
        y += Math.round(H * 0.018);
      }
    }
    y += Math.round(H * 0.02);
  }

  // Series number
  ctx.fillStyle = '#786450';
  ctx.font = Math.round(W * 0.03) + 'px "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText(data.seriesNumber || 'E01/001', W - Math.round(W * 0.12), H - Math.round(H * 0.08));

  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// ── AI API calls ────────────────────────────────────────────
async function callNormalModel(idiom, baseUrl, apiKey, modelName) {
  var prompt =
    '你是一位中文教育内容策划师。请用简洁、适合儿童阅读的中文，生成一个成语卡片的三个部分：\n' +
    '成语：' + idiom + '\n' +
    '1. 简单解释：二到三句，通俗易懂；\n' +
    '2. 故事讲述：一个短小故事；\n' +
    '3. 家长提示：一条教育建议。\n' +
    '请以 JSON 格式返回 {"explanation":..., "story":..., "tip":...}';

  var resp = await fetch(baseUrl.replace(/\/$/, '') + '/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: modelName || 'gpt-4o-mini',
      messages: [
        { role: 'system', content: '你是一个中文教育内容生成器，输出必须是 JSON。' },
        { role: 'user', content: prompt }
      ],
      temperature: 0.7
    })
  });
  if (!resp.ok) throw new Error('API 返回 ' + resp.status);
  var data = await resp.json();
  var content = (data.choices[0].message.content || '').replace(/```json|```/g, '').trim();
  try {
    return JSON.parse(content);
  } catch (e) {
    return {};
  }
}

async function callImageModel(idiom, baseUrl, apiKey, modelName) {
  var resp = await fetch(baseUrl.replace(/\/$/, '') + '/images/generations', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: modelName || 'gpt-image-1',
      prompt: '中国古风插画，成语教育卡片背景，色调温暖，古典场景，适合儿童阅读，与' + idiom + '相关的故事氛围，禁止文字、禁止字样、禁止标志',
      size: '1024x1024',
      response_format: 'b64_json'
    })
  });
  if (!resp.ok) throw new Error('生图 API 返回 ' + resp.status);
  var data = await resp.json();
  if (data.data && data.data[0] && data.data[0].b64_json) {
    return 'data:image/png;base64,' + data.data[0].b64_json;
  }
  if (data.data && data.data[0] && data.data[0].url) {
    return data.data[0].url;
  }
  return null;
}

function loadImage(src) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() { resolve(img); };
    img.onerror = function() { reject(new Error('图片加载失败')); };
    img.src = src;
  });
}

// ── Event handling ──────────────────────────────────────────
var form = document.getElementById('cardForm');
var submitBtn = document.getElementById('submitBtn');
var spinner = document.getElementById('spinner');
var previewArea = document.getElementById('previewArea');
var currentCardData = null;

function setLoading(loading) {
  submitBtn.disabled = loading;
  spinner.className = loading ? 'spinner show' : 'spinner';
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  hideMsg();
  setLoading(true);

  var idiom = document.getElementById('idiom').value.trim();
  var pinyin = document.getElementById('pinyin').value.trim();
  var explanation = document.getElementById('explanation').value.trim();
  var story = document.getElementById('story').value.trim();
  var tip = document.getElementById('tip').value.trim();
  var normalBase = document.getElementById('normal_base').value.trim();
  var normalKey = document.getElementById('normal_key').value.trim();
  var normalModel = document.getElementById('normal_model').value.trim();
  var imageBase = document.getElementById('image_base').value.trim();
  var imageKey = document.getElementById('image_key').value.trim();
  var imageModel = document.getElementById('image_model').value.trim();

  if (!idiom) {
    showMsg('请输入成语名称', 'error');
    setLoading(false);
    return;
  }

  // Auto pinyin
  if (!pinyin) {
    pinyin = getPinyin(idiom);
  }

  // Default content
  var card = {
    idiom: idiom,
    pinyin: pinyin,
    explanation: explanation || idiom + '是一个富有教育意义的成语，适合用来培养观察力与表达能力。',
    story: story || '这个成语故事可以通过生活中的小例子帮助孩子理解其含义。',
    tip: tip || '在教学中，可以结合日常情境让孩子更好地理解' + idiom + '。',
    seriesNumber: 'E01/' + Math.random().toString(36).slice(2, 6).toUpperCase()
  };

  var aiUsed = false;
  var errorMsg = null;

  // Call normal model
  if (normalBase && normalKey) {
    try {
      var aiResult = await callNormalModel(idiom, normalBase, normalKey, normalModel);
      if (aiResult.explanation) card.explanation = aiResult.explanation;
      if (aiResult.story) card.story = aiResult.story;
      if (aiResult.tip) card.tip = aiResult.tip;
      aiUsed = true;
    } catch (err) {
      errorMsg = '正常模型调用失败：' + err.message + '，已改用本地默认内容。';
      if (!explanation) card.explanation = idiom + '是一个富有教育意义的成语，适合用来培养观察力与表达能力。';
      if (!story) card.story = '这个成语故事可以通过生活中的小例子帮助孩子理解其含义。';
      if (!tip) card.tip = '在教学中，可以结合日常情境让孩子更好地理解' + idiom + '。';
    }
  } else {
    if (explanation) card.explanation = explanation;
    if (story) card.story = story;
    if (tip) card.tip = tip;
  }

  // Call image model
  var illustrationImg = null;
  if (imageBase && imageKey) {
    try {
      var imgSrc = await callImageModel(idiom, imageBase, imageKey, imageModel);
      if (imgSrc) {
        illustrationImg = await loadImage(imgSrc);
      }
    } catch (err) {
      if (!errorMsg) errorMsg = '生图模型调用失败：' + err.message;
    }
  }

  loadedIllustration = illustrationImg;
  currentCardData = card;

  // Render preview
  var previewCanvas = document.createElement('canvas');
  previewCanvas.id = 'previewCanvas';
  renderCard(previewCanvas, 0.35, card, illustrationImg);

  previewArea.innerHTML = '';
  previewArea.appendChild(previewCanvas);

  var metaDiv = document.createElement('div');
  metaDiv.className = 'card-meta';
  metaDiv.innerHTML =
    '<p><strong>成语：</strong>' + escapeHtml(card.idiom) + '</p>' +
    '<p><strong>拼音：</strong>' + escapeHtml(card.pinyin) + '</p>' +
    '<p><strong>解释：</strong>' + escapeHtml(card.explanation) + '</p>';
  previewArea.appendChild(metaDiv);

  var downloadBtn = document.createElement('button');
  downloadBtn.textContent = '下载卡片图片';
  downloadBtn.className = 'download-btn';
  downloadBtn.onclick = downloadCard;
  previewArea.appendChild(downloadBtn);

  if (errorMsg) showMsg(errorMsg, 'info');

  setLoading(false);
});

function downloadCard() {
  if (!currentCardData) return;
  var canvas = document.createElement('canvas');
  renderCard(canvas, 1, currentCardData, loadedIllustration);
  canvas.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (currentCardData.idiom || 'idiom_card') + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

})();
</script>
</body>
</html>
